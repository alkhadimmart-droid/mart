<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Khadim Mart - VIP Customer Portal</title>
    <style>
        /* Modern Dark Theme for VIP Experience */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; margin: 0; color: #f8fafc; }
        
        /* VIP Premium Header */
        .header { background: #1e293b; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #f59e0b; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .header h1 { margin: 0; color: #38bdf8; font-size: 24px; font-weight: bold; }
        .vip-badge { background: #f59e0b; color: #0f172a; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 10px; display: inline-block; }
        .header-subtitle { display: block; font-size: 13px; color: #94a3b8; font-weight: normal; margin-top: 4px; }
        
        /* Buttons */
        button { cursor: pointer; font-weight: bold; border: none; transition: 0.2s; border-radius: 6px; padding: 10px 15px; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        .btn-lang { background: #f59e0b; color: #0f172a; padding: 8px 18px; border-radius: 20px; font-size: 14px; }
        .btn-add { background: #38bdf8; color: #0f172a; width: 100%; padding: 12px; font-size: 15px; border-radius: 8px; }
        .btn-submit { background: #10b981; color: white; width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        
        /* Layout Structure */
        .main-container { display: flex; height: calc(100vh - 90px); overflow: hidden; }
        .products-area { flex: 7; padding: 25px; overflow-y: auto; }
        .order-summary-area { flex: 3; background: #1e293b; padding: 25px; border-left: 2px solid #334155; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Interactive Search */
        .search-wrapper { margin-bottom: 25px; }
        .search-wrapper input { width: 100%; padding: 15px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 10px; font-size: 16px; outline: none; box-sizing: border-box; }
        .search-wrapper input:focus { border-color: #38bdf8; }

        /* Product Visual Cards Grid */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: #1e293b; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #334155; transition: 0.3s; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card:hover { border-color: #38bdf8; transform: translateY(-3px); box-shadow: 0 6px 15px rgba(56, 189, 248, 0.2); }
        .product-title { font-size: 18px; font-weight: bold; color: #f1f5f9; margin: 10px 0 8px 0; }
        .product-status { font-size: 13px; color: #10b981; margin-bottom: 15px; font-weight: 500; }
        .product-price { font-size: 22px; font-weight: 800; color: #f59e0b; margin-bottom: 15px; }
        
        /* Customer Details Form */
        .cust-form-group { margin-bottom: 15px; }
        .cust-form-group input, .cust-form-group textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none; }
        .cust-form-group input:focus { border-color: #38bdf8; }

        /* Order Items Table */
        .order-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .order-table th, .order-table td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; font-size: 14px; }
        .order-table th { color: #94a3b8; font-weight: normal; }
        
        /* Total Section */
        .total-display-box { background: #0f172a; padding: 20px; border-radius: 10px; margin-top: auto; border: 1px solid #334155; }
        .total-row { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: bold; color: #10b981; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <button id="langToggleBtn" class="btn-lang" onclick="changeLanguageMode()">اردو کریں</button>
        </div>
        <div style="text-align: center;">
            <h1>Al Khadim Wholesale Mart <span class="vip-badge">VIP PORTAL</span></h1>
            <span class="header-subtitle" id="portalSubTitle">Book Your Online Order Instantly & Smartly</span>
        </div>
        <div style="width: 100px;"></div> </div>

    <div class="main-container">
        
        <div class="products-area">
            <div class="search-wrapper">
                <input type="text" id="custSearchInput" placeholder="🔍 Search items / Saman ka naam likhein..." onkeyup="searchPortalProducts()">
            </div>
            
            <div class="products-grid" id="portalItemGrid">
                </div>
        </div>

        <div class="order-summary-area">
            <h3 style="margin-top:0; color:#38bdf8; font-size:18px; border-bottom:1px solid #334155; padding-bottom:10px;" id="cartHeadingText">🛒 Your Order Summary</h3>
            
            <div class="cust-form-group">
                <input type="text" id="vipCustName" placeholder="Your Full Name / Apna Naam">
            </div>
            <div class="cust-form-group">
                <input type="number" id="vipCustPhone" placeholder="WhatsApp / Mobile Number">
            </div>
            <div class="cust-form-group">
                <textarea id="vipCustAddress" rows="2" placeholder="Delivery Address / Mukammal Pata"></textarea>
            </div>

            <div style="flex-grow: 1; overflow-y: auto; margin-bottom: 15px;">
                <table class="order-table">
                    <thead>
                        <tr>
                            <th id="thItem">Item</th>
                            <th id="thQty" style="text-align:center;">Qty</th>
                            <th id="thTotal" style="text-align:right;">Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="portalCartRows">
                        </tbody>
                </table>
            </div>

            <div class="total-display-box">
                <div class="total-row">
                    <span id="txtGrandTotal">Grand Total:</span>
                    <span>Rs. <span id="vipOrderNetTotal">0</span></span>
                </div>
                <p style="margin: 10px 0 0 0; font-size: 12px; color: #94a3b8; text-align: center;" id="txtTaxNote">Prices are fixed wholesale rates.</p>
            </div>

            <button class="btn-submit" style="margin-top:15px;" onclick="submitVipOnlineOrder()" id="btnPlaceOrder">
                🚀 Send Online Order
            </button>
        </div>

    </div>

    <script>
        // Synchronized Product Stock matching counter.html exactly
        const portalInventoryStock = [
            { id: "P1", name: "Hilal Cake", price: 200 },
            { id: "P2", name: "Crust Wafer", price: 200 },
            { id: "P3", name: "Treat Candy", price: 110 },
            { id: "P4", name: "Kulfa Jar", price: 200 },
            { id: "P5", name: "Rite", price: 270 },
            { id: "P6", name: "Bazooka", price: 200 }
        ];

        // Fetch custom items added by admin via localStorage if any
        let localProducts = JSON.parse(localStorage.getItem("mart_products")) || [];
        let activeProductsList = localProducts.length > 0 ? localProducts : portalInventoryStock;

        let customerCart = [];
        let languageUrduActive = false;

        // Render Online Store Grid Layout
        function loadPortalProducts(filterWord = "") {
            let storeGridHtml = "";
            let filteredList = activeProductsList.filter(item => item.name.toLowerCase().includes(filterWord.toLowerCase()));

            filteredList.forEach(item => {
                storeGridHtml += `
                <div class="product-card">
                    <div class="product-title">${item.name}</div>
                    <div class="product-status">● Available in Stock</div>
                    <div class="product-price">Rs. ${item.price}</div>
                    <button class="btn-add" onclick="addItemToVipCart('${item.id}', '${item.name}', ${item.price})">➕ Add to Order</button>
                </div>`;
            });
            
            if(filteredList.length === 0) {
                storeGridHtml = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Koi item nahi mila!</div>`;
            }
            document.getElementById("portalItemGrid").innerHTML = storeGridHtml;
        }

        function searchPortalProducts() {
            loadPortalProducts(document.getElementById("custSearchInput").value);
        }

        // Cart Calculations & Management
        function addItemToVipCart(id, name, price) {
            let itemFound = customerCart.find(c => c.id === id);
            if(itemFound) {
                itemFound.qty++;
            } else {
                customerCart.push({ id, name, price, qty: 1 });
            }
            refreshVipCartDisplay();
        }

        function modifyPortalQty(idx, shift) {
            customerCart[idx].qty += shift;
            if(customerCart[idx].qty <= 0) {
                customerCart.splice(idx, 1);
            }
            refreshVipCartDisplay();
        }

        function refreshVipCartDisplay() {
            let rowHtml = "";
            let orderTotalSum = 0;

            customerCart.forEach((item, index) => {
                let rowSum = item.price * item.qty;
                orderTotalSum += rowSum;

                rowHtml += `
                <tr>
                    <td style="font-weight:500;">${item.name}</td>
                    <td style="text-align:center;">
                        <button onclick="modifyPortalQty(${index}, -1)" style="padding:2px 6px; background:#475569; color:white; border-radius:4px;">-</button>
                        <span style="margin: 0 5px; font-weight:bold;">${item.qty}</span>
                        <button onclick="modifyPortalQty(${index}, 1)" style="padding:2px 6px; background:#475569; color:white; border-radius:4px;">+</button>
                    </td>
                    <td style="text-align:right; font-weight:bold; color:#10b981;">Rs. ${rowSum}</td>
                    <td style="text-align:right;"><button style="background:transparent; color:#ef4444; padding:0;" onclick="customerCart.splice(${index},1); refreshVipCartDisplay();">❌</button></td>
                </tr>`;
            });

            document.getElementById("portalCartRows").innerHTML = rowHtml;
            document.getElementById("vipOrderNetTotal").innerText = orderTotalSum;
        }

        // Submitting Order via WhatsApp Integration
        function submitVipOnlineOrder() {
            let cName = document.getElementById("vipCustName").value.trim();
            let cPhone = document.getElementById("vipCustPhone").value.trim();
            let cAddress = document.getElementById("vipCustAddress").value.trim();
            let finalSum = document.getElementById("vipOrderNetTotal").innerText;

            if(customerCart.length === 0) {
                return alert(languageUrduActive ? "Aapka order khali hai! Pehle saman shamil karein." : "Your order is empty! Please add items first.");
            }
            if(!cName || !cPhone) {
                return alert(languageUrduActive ? "Meharbani karke apna Naam aur Mobile number laazmi likhein!" : "Please provide your Name and Contact number!");
            }

            // Save order in local history so admin panel can track it
            let wholesaleOrders = JSON.parse(localStorage.getItem("mart_sales")) || [];
            wholesaleOrders.push({
                date: new Date().toISOString().split('T')[0],
                cashier: "Online Portal (" + cName + ")",
                total: parseFloat(finalSum),
                profit: 0, // Customer screen cannot calculate profit logic
                cashPaid: 0, 
                phone: cPhone
            });
            localStorage.setItem("mart_sales", JSON.stringify(wholesaleOrders));

            // Generate beautifully structured text message for WhatsApp order placement
            let msgText = `*Al Khadim Mart - New VIP Online Order*\n`;
            msgText += `-----------------------------\n`;
            msgText += `*Customer Name:* ${cName}\n`;
            msgText += `*Phone:* ${cPhone}\n`;
            if(cAddress) msgText += `*Address:* ${cAddress}\n`;
            msgText += `-----------------------------\n`;
            msgText += `*Items Ordered:*\n`;
            
            customerCart.forEach(c => {
                msgText += `- ${c.name} (Qty: ${c.qty}) = Rs. ${c.price * c.qty}\n`;
            });
            
            msgText += `-----------------------------\n`;
            msgText += `*Total Bill Amount:* Rs. ${finalSum}\n`;
            msgText += `Status: Pending Verification`;

            // Open WhatsApp link
            let secureUrl = "https://wa.me/?text=" + encodeURIComponent(msgText);
            window.open(secureUrl, '_blank');

            alert(languageUrduActive ? "Order kamyabi se submit ho gaya!" : "Your order has been submitted successfully!");
            
            // Clear Dashboard Form
            customerCart = [];
            document.getElementById("vipCustName").value = "";
            document.getElementById("vipCustPhone").value = "";
            document.getElementById("vipCustAddress").value = "";
            refreshVipCartDisplay();
        }

        // Translation Engine (Urdu/English)
        function changeLanguageMode() {
            languageUrduActive = !languageUrduActive;
            let langBtn = document.getElementById("langToggleBtn");

            if(languageUrduActive) {
                langBtn.innerText = "English Mode";
                document.getElementById("portalSubTitle").innerText = "Apna Online Order Ghar Baithe Ba-asani Book Karein";
                document.getElementById("custSearchInput").placeholder = "🔍 Saman ka naam talash karein...";
                document.getElementById("cartHeadingText").innerText = "🛒 Aapka Order Summary";
                document.getElementById("vipCustName").placeholder = "Apna Mukammal Naam";
                document.getElementById("vipCustPhone").placeholder = "WhatsApp / Mobile Number";
                document.getElementById("vipCustAddress").placeholder = "Saman Mangwane Ka Pata (Address)";
                document.getElementById("thItem").innerText = "Saman";
                document.getElementById("thQty").innerText = "Tadaad";
                document.getElementById("thTotal").innerText = "Total";
                document.getElementById("txtGrandTotal").innerText = "Kul Raqam:";
                document.getElementById("txtTaxNote").innerText = "Tamam rates wholesale fixed hain.";
                document.getElementById("btnPlaceOrder").innerText = "🚀 Online Order Bhejein";
            } else {
                langBtn.innerText = "اردو کریں";
                document.getElementById("portalSubTitle").innerText = "Book Your Online Order Instantly & Smartly";
                document.getElementById("custSearchInput").placeholder = "🔍 Search items / Saman ka naam likhein...";
                document.getElementById("cartHeadingText").innerText = "🛒 Your Order Summary";
                document.getElementById("vipCustName").placeholder = "Your Full Name / Apna Naam";
                document.getElementById("vipCustPhone").placeholder = "WhatsApp / Mobile Number";
                document.getElementById("vipCustAddress").placeholder = "Delivery Address / Mukammal Pata";
                document.getElementById("thItem").innerText = "Item";
                document.getElementById("thQty").innerText = "Qty";
                document.getElementById("thTotal").innerText = "Total";
                document.getElementById("txtGrandTotal").innerText = "Grand Total:";
                document.getElementById("txtTaxNote").innerText = "Prices are fixed wholesale rates.";
                document.getElementById("btnPlaceOrder").innerText = "🚀 Send Online Order";
            }
        }

        // Auto Boot Portal on Load
        window.onload = function() {
            loadPortalProducts();
        };
    </script>
</body>
</html>
