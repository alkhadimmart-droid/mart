<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Khadim Mart - Customer Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; margin: 0; padding: 15px; color: #f8fafc; }
        .header-card { background: linear-gradient(135deg, #0284c7, #0f172a); padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 20px; position: relative; }
        h1 { margin: 0; font-size: 24px; color: white; }
        p { margin: 5px 0 0 0; color: #bae6fd; font-size: 14px; }
        .lang-btn { background: #f59e0b; color: #0f172a; font-weight: bold; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; position: absolute; top: 15px; right: 15px; font-size: 12px; }
        .search-box { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .product-list { display: flex; flex-direction: column; gap: 12px; }
        .product-card { background: #1e293b; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border-left: 5px solid #38bdf8; transition: 0.2s; }
        .product-details h3 { margin: 0 0 5px 0; font-size: 18px; color: #f1f5f9; }
        .product-details span { font-size: 13px; color: #94a3b8; }
        .price-tag { background: #10b981; color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 16px; text-align: right; }
        .out-of-stock { border-left-color: #ef4444 !important; opacity: 0.6; }
        .out-of-stock .price-tag { background: #ef4444 !important; font-size: 12px; }
        
        /* RTL settings for Urdu */
        .rtl { direction: rtl; text-align: right; }
        .rtl .lang-btn { right: auto; left: 15px; }
        .rtl .product-card { border-left: none; border-right: 5px solid #38bdf8; }
        .rtl .out-of-stock { border-right-color: #ef4444 !important; }
    </style>
</head>
<body>

    <div class="header-card" id="headerArea">
        <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">اردو کریں</button>
        <h1 id="txtTitle">Al Khadim Brothers Wholesale Mart</h1>
        <p id="txtSubTitle">Live Digital Price List & Stock Status</p>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search item name or code..." oninput="filterProducts()">

    <div class="product-list" id="productsContainer">
        </div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBzeLfXKCD-yp22eXJeUJqqGAgexq-tGvo", // 👈 Apni asli key yahan mita kar lagayein
        authDomain: "al-khadim-mart.firebaseapp.com",
        databaseURL: "https://al-khadim-mart-default-rtdb.firebaseio.com/",
        projectId: "al-khadim-mart",
        storageBucket: "al-khadim-mart.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allProducts = {};
    let currentLang = "en";

    const langData = {
        en: {
            title: "Al Khadim Brothers Wholesale Mart",
            sub: "Live Digital Price List & Stock Status",
            search: "🔍 Search item name or code...",
            btn: "اردو کریں",
            code: "Code: #",
            available: "In Stock",
            notAvailable: "Out of Stock"
        },
        ur: {
            title: "الخادم برادرز ہول سیل مارٹ",
            sub: "لائیو ڈیجیٹل ریٹ لسٹ اور اسٹاک کی صورتحال",
            search: "🔍 سامان کا نام یا کوڈ تلاش کریں...",
            btn: "English",
            code: "آئٹم کوڈ: #",
            available: "اسٹاک میں موجود ہے",
            notAvailable: "ختم ہو گیا ہے"
        }
    };

    // Realtime Database se data uthana
    db.ref('products_inventory').on('value', (snapshot) => {
        if(snapshot.exists()) {
            allProducts = snapshot.val();
            displayProducts();
        } else {
            document.getElementById("productsContainer").innerHTML = "<p style='text-align:center;'>No products available.</p>";
        }
    });

    function displayProducts() {
        let container = document.getElementById("productsContainer");
        container.innerHTML = "";
        let searchTxt = document.getElementById("searchInput").value.toLowerCase();
        let lang = langData[currentLang];

        for(let code in allProducts) {
            let p = allProducts[code];
            let name = p.name.toLowerCase();
            
            // Search filter check
            if(name.includes(searchTxt) || code.includes(searchTxt)) {
                let isAvailable = (p.stock && p.stock > 0);
                let stockStatusText = isAvailable ? `${p.stock} ${lang.available}` : lang.notAvailable;
                let cardClass = isAvailable ? "product-card" : "product-card out-of-stock";
                let priceDisplay = isAvailable ? `Rs. ${p.sale}` : (currentLang === "en" ? "SOLD OUT" : "ختم");

                container.innerHTML += `
                    <div class="${cardClass}">
                        <div class="product-details">
                            <h3>${p.name}</h3>
                            <span>${lang.code}${code} | ${stockStatusText}</span>
                        </div>
                        <div class="price-tag">
                            ${priceDisplay}
                        </div>
                    </div>
                `;
            }
        }
    }

    function filterProducts() {
        displayProducts();
    }

    function toggleLanguage() {
        currentLang = currentLang === "en" ? "ur" : "en";
        let data = langData[currentLang];

        // Header update
        document.getElementById("txtTitle").innerText = data.title;
        document.getElementById("txtSubTitle").innerText = data.sub;
        document.getElementById("searchInput").placeholder = data.search;
        document.getElementById("langBtn").innerText = data.btn;

        // Alignment switch
        if(currentLang === "ur") {
            document.body.classList.add("rtl");
            document.getElementById("headerArea").classList.add("rtl");
        } else {
            document.body.classList.remove("rtl");
            document.getElementById("headerArea").classList.remove("rtl");
        }

        displayProducts();
    }
</script>
</body>
</html>
